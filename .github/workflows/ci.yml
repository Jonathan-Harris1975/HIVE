name: HIVE production verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --requirement requirements.txt --requirement requirements-dev.txt
      - name: Tests with enforced coverage threshold
        run: >-
          PYTHONPATH=backend python -m pytest backend/tests -q
          --cov=app --cov-report=term-missing --cov-report=xml
          --cov-fail-under=${{ vars.HIVE_COVERAGE_MIN || 60 }}
      - run: python -m ruff check backend/app backend/tests scripts
      - run: python -m pip check
      - name: Static type checking (mypy)
        run: python -m mypy backend/app
      - name: Security lint (bandit)
        run: python -m bandit -r backend/app -ll
      - name: Dependency vulnerability audit (pip-audit)
        run: python -m pip-audit -r requirements.txt
      - name: Production configuration preflight
        env:
          APP_ENV: production
          ADMIN_BEARER_TOKEN: ci-admin-token-with-sufficient-length
          OPENROUTER_API_KEY: ci-openrouter-token-with-sufficient-length
          R2_ACCOUNT_ID: 00000000000000000000000000000000
          R2_ACCESS_KEY_ID: ci-r2-access-key
          R2_SECRET_ACCESS_KEY: ci-r2-secret-key-with-sufficient-length
          R2_BUCKET_UPLOADS: hive
          R2_ENDPOINT_URL: https://00000000000000000000000000000000.r2.cloudflarestorage.com
          R2_MULTI_BUCKET_READ_ENABLED: 'true'
          R2_READ_ACCESS_KEY_ID: ci-r2-read-key
          R2_READ_SECRET_ACCESS_KEY: ci-r2-read-secret
          R2_BUCKET_META_SYSTEM: metasystem
          R2_BUCKET_HIVE_SKILLS: hive-skills
          R2_PUBLIC_BASE_URL_HIVE_SKILLS: https://pub-da50a6512f164566955a3076a1c795ef.r2.dev
          MAST_MONITOR_MODE: r2
          RAMS_HEALTH_URL: https://mod.jonathan-harris.online/livez
          RAMS_READINESS_URL: https://mod.jonathan-harris.online/readiness
          RAMS_HEALTH_BEARER_TOKEN: ci-rams-token-with-sufficient-length
          RAMS_READINESS_BEARER_TOKEN: ci-rams-token-with-sufficient-length
          CORS_ORIGINS: https://hive.jonathan-harris.online
          ALLOWED_HOSTS: hive-ci.example.invalid
          DATABASE_ENABLED: 'false'
          D1_ENABLED: 'false'
          VECTORIZE_ENABLED: 'false'
          EMBEDDINGS_ENABLED: 'false'
        run: PYTHONPATH=backend python scripts/production_preflight.py

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hive:ci .

  notify_failure:
    name: Notify central operations on CI failure
    needs: [backend, container]
    if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Send redacted HIVE operational event
        env:
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
          OPS_ALERT_WEBHOOK_TOKEN: ${{ secrets.OPS_ALERT_WEBHOOK_TOKEN }}
        run: >-
          python scripts/ops_notify.py
          --service HIVE
          --event-type ci_failed
          --title "HIVE GitHub Actions failed"
          --summary "The governed CI workflow failed. Open the linked run for the failing job and logs."
          --event-id "github:${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}"
          --release-id "${{ github.sha }}"
          --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

