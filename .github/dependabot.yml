version: 2
updates:
  # Python dependencies (requirements.txt / requirements-dev.txt).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: "deps"

  # Base images referenced in the Dockerfile.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(docker)"

  # Actions used in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ci)"
